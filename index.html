<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Tracker</title>
<style>
:root {
  --bg-deep:    #0D1B2A;
  --bg-main:    #1B2A3B;
  --bg-card:    #243447;
  --bg-input:   #0D1B2A;
  --accent1:    #00C2FF;
  --accent2:    #00FF9C;
  --accent3:    #FF6B35;
  --text-main:  #FFFFFF;
  --text-soft:  #8BA8C4;
  --text-muted: #4A6580;
  --border:     #2D4460;
  --set-done-bg: #00C2FF;
  --set-done-text: #0D1B2A;
}
/* ── THEMES ── */
.theme-ocean    { --bg-deep:#0D1B2A; --bg-main:#1B2A3B; --bg-card:#243447; --bg-input:#0D1B2A; --accent1:#00C2FF; --accent2:#00FF9C; --accent3:#FF6B35; --text-soft:#8BA8C4; --text-muted:#4A6580; --border:#2D4460; --set-done-bg:#00C2FF; --set-done-text:#0D1B2A; }
.theme-forest   { --bg-deep:#0A1F0D; --bg-main:#132A16; --bg-card:#1C3B20; --bg-input:#0A1F0D; --accent1:#4ADE80; --accent2:#FDE047; --accent3:#FB923C; --text-soft:#86EFAC; --text-muted:#4A7A52; --border:#2D5A35; --set-done-bg:#4ADE80; --set-done-text:#0A1F0D; }
.theme-sunset   { --bg-deep:#1A0A00; --bg-main:#2D1200; --bg-card:#3D1F00; --bg-input:#1A0A00; --accent1:#FF6B35; --accent2:#FFD166; --accent3:#EF476F; --text-soft:#FFBA88; --text-muted:#7A4A25; --border:#5A2D00; --set-done-bg:#FF6B35; --set-done-text:#1A0A00; }
.theme-midnight { --bg-deep:#0A0A1A; --bg-main:#12122A; --bg-card:#1A1A3A; --bg-input:#0A0A1A; --accent1:#A78BFA; --accent2:#F472B6; --accent3:#34D399; --text-soft:#8B8BC4; --text-muted:#4A4A80; --border:#2A2A5A; --set-done-bg:#A78BFA; --set-done-text:#0A0A1A; }
.theme-steel    { --bg-deep:#111318; --bg-main:#1C1F26; --bg-card:#252A33; --bg-input:#111318; --accent1:#E2E8F0; --accent2:#F59E0B; --accent3:#EF4444; --text-soft:#94A3B8; --text-muted:#475569; --border:#334155; --set-done-bg:#F59E0B; --set-done-text:#111318; }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg-deep); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; color: var(--text-main); overflow-x: hidden; }

.app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg-main); }

/* HEADER */
.header { background: var(--bg-deep); padding: 52px 20px 14px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header h1 { color: var(--accent1); font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
.header .sub { color: var(--text-soft); font-size: 11px; margin-top: 2px; }
.settings-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-soft); padding: 5px 10px; font-size: 12px; cursor: pointer; }
.settings-btn:active { background: var(--bg-card); }

/* SETTINGS PANEL */
.settings-panel { display: none; background: var(--bg-deep); border-bottom: 1px solid var(--border); padding: 16px; }
.settings-panel.open { display: block; }
.settings-section { margin-bottom: 16px; }
.settings-label { color: var(--accent1); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.settings-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 9px; color: var(--text-main); font-size: 14px; padding: 9px 12px; outline: none; font-family: inherit; }
.settings-input:focus { border-color: var(--accent1); }
.theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.theme-swatch { height: 36px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; transition: all 0.15s; }
.theme-swatch.active { border-color: var(--accent1); }
.theme-swatch:active { transform: scale(0.94); }
.sw-ocean    { background: linear-gradient(135deg,#0D1B2A,#00C2FF); color:#00C2FF; }
.sw-forest   { background: linear-gradient(135deg,#0A1F0D,#4ADE80); color:#4ADE80; }
.sw-sunset   { background: linear-gradient(135deg,#1A0A00,#FF6B35); color:#FF6B35; }
.sw-midnight { background: linear-gradient(135deg,#0A0A1A,#A78BFA); color:#A78BFA; }
.sw-steel    { background: linear-gradient(135deg,#111318,#F59E0B); color:#F59E0B; }
.swatch-label { color: var(--text-soft); font-size: 9px; display: block; text-align: center; margin-top: 3px; }
.default-sets-row { display: flex; gap: 8px; align-items: center; }
.default-sets-row label { color: var(--text-soft); font-size: 12px; flex: 1; }
.default-sets-row input { width: 56px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--accent1); font-size: 14px; padding: 6px 8px; text-align: center; outline: none; }
.close-settings { width: 100%; padding: 10px; background: var(--accent1); border: none; border-radius: 9px; color: var(--bg-deep); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }

/* PROGRESS BAR */
.prog-bar { display: flex; gap: 4px; margin: 10px 16px 0; }
.prog-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); cursor: pointer; transition: background 0.2s; }
.prog-seg.active { background: var(--accent1); }
.prog-seg.gym-done { background: var(--accent1); opacity: 0.4; }
.prog-seg.run-done { background: var(--accent2); opacity: 0.6; }
.prog-seg.rest-done { background: var(--text-muted); opacity: 0.5; }

/* DAY NAV */
.day-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0; }
.day-arrow { background: var(--bg-card); border: 1px solid var(--border); color: var(--accent1); width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.day-arrow:active { transform: scale(0.93); }
.day-center { text-align: center; flex: 1; padding: 0 8px; }
.day-name-txt { color: var(--text-main); font-size: 14px; font-weight: 700; }
.day-date-txt { color: var(--text-soft); font-size: 11px; margin-top: 2px; }
.day-badge { display: inline-block; font-size: 10px; padding: 2px 10px; border-radius: 20px; margin-top: 4px; font-weight: 600; }
.badge-gym  { background: var(--accent1); color: var(--bg-deep); }
.badge-run  { background: var(--accent2); color: var(--bg-deep); }
.badge-mod  { background: var(--accent3); color: var(--bg-deep); }
.badge-rest { background: var(--border); color: var(--text-soft); }

/* SCROLL */
.scroll-content { padding: 14px 16px 100px; }

/* CARDS */
.card { background: var(--bg-card); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.card-ex-name { color: var(--accent1); font-size: 13px; font-weight: 600; margin-bottom: 9px; display: flex; align-items: flex-start; gap: 7px; line-height: 1.3; }

/* SETS */
.sets-row { display: flex; gap: 6px; margin-bottom: 9px; }
.set-btn { flex: 1; padding: 8px 2px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg-input); color: var(--text-soft); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; transition: all 0.15s; }
.set-btn.done { background: var(--set-done-bg); border-color: var(--set-done-bg); color: var(--set-done-text); font-weight: 700; }
.set-btn:active { transform: scale(0.95); }

/* WEIGHT / REPS */
.metric-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.metric-group { display: flex; align-items: center; gap: 7px; }
.metric-label { color: var(--text-soft); font-size: 11px; }
.metric-input { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); font-size: 13px; padding: 6px 8px; width: 68px; text-align: center; outline: none; -webkit-appearance: none; }
.metric-input.reps { color: var(--accent2); width: 52px; }
.metric-input:focus { border-color: var(--accent1); }
.metric-unit { color: var(--text-muted); font-size: 11px; }

/* RUN */
.run-card { background: var(--bg-card); border: 1px solid var(--accent2); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; }
.run-title { color: var(--accent2); font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-box { background: var(--bg-input); border-radius: 9px; padding: 9px 10px; border: 1px solid var(--border); }
.stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px; }
.stat-box-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--accent1); font-size: 15px; font-weight: 700; width: 100%; outline: none; padding: 2px 0; }
.stat-box-input::placeholder { color: var(--text-muted); font-size: 12px; font-weight: 400; }
.cp-row { display: flex; gap: 6px; }
.cp-btn { flex: 1; padding: 9px 2px; border-radius: 8px; border: 1.5px solid var(--accent2); background: var(--bg-input); color: var(--accent2); font-size: 11px; font-weight: 500; cursor: pointer; text-align: center; }
.cp-btn.done { background: var(--accent2); color: var(--bg-deep); font-weight: 700; }
.cp-btn:active { transform: scale(0.95); }

/* TREADMILL */
.tmill-card { background: var(--bg-card); border: 1px solid var(--accent3); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; }
.tmill-title { color: var(--accent3); font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.tmill-btn { width: 100%; padding: 10px; border-radius: 9px; border: 1.5px solid var(--accent3); background: var(--bg-input); color: var(--accent3); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
.tmill-btn.done { background: var(--accent3); color: var(--bg-deep); }
.tmill-btn:active { transform: scale(0.98); }

/* SAUNA */
.sauna-card { background: var(--bg-card); border: 1px solid #8B3A10; border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; }
.sauna-title { color: #F59642; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.sauna-btn { width: 100%; padding: 10px; border-radius: 9px; border: 1.5px solid #8B3A10; background: var(--bg-input); color: #F59642; font-size: 13px; font-weight: 600; cursor: pointer; }
.sauna-btn.done { background: #E07830; border-color: #E07830; color: #fff; }
.sauna-btn:active { transform: scale(0.98); }

/* REST / FLEX */
.rest-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; text-align: center; }
.rest-emoji { font-size: 28px; margin-bottom: 8px; }
.rest-title { color: var(--accent1); font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.rest-item { display: flex; align-items: center; gap: 10px; padding: 4px 0; text-align: left; }
.rest-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
.rest-item span { color: var(--text-soft); font-size: 13px; }
.flex-card { background: var(--bg-card); border: 1px dashed var(--border); border-radius: 14px; padding: 20px; margin-bottom: 10px; text-align: center; }
.flex-title { color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.flex-desc { color: var(--text-muted); font-size: 12px; line-height: 1.6; }

/* NOTES */
.notes-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; }
.notes-label { color: var(--accent1); font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.notes-area { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 9px; color: var(--text-main); font-size: 13px; padding: 10px 12px; resize: none; outline: none; font-family: inherit; line-height: 1.5; }
.notes-area:focus { border-color: var(--accent1); }
.notes-area::placeholder { color: var(--text-muted); }

/* SECTION HDR */
.section-hdr { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; padding-left: 2px; }

/* ── HISTORY TAB ── */
.hist-wrap { padding: 14px 16px 100px; }
.hist-day-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.hist-day-pills::-webkit-scrollbar { display: none; }
.hist-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--text-soft); font-size: 12px; font-weight: 500; cursor: pointer; }
.hist-pill.active { background: var(--accent1); border-color: var(--accent1); color: var(--bg-deep); font-weight: 700; }
.hist-ex-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-bottom: 10px; }
.hist-ex-name { color: var(--accent1); font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.hist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.hist-week-lbl { color: var(--text-muted); font-size: 11px; min-width: 58px; }
.hist-bar-wrap { flex: 1; background: var(--bg-input); border-radius: 4px; height: 20px; overflow: hidden; }
.hist-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; min-width: 4px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
.hist-bar-val { font-size: 11px; font-weight: 700; color: var(--bg-deep); white-space: nowrap; }
.hist-pr { font-size: 10px; color: var(--accent2); font-weight: 700; margin-left: 4px; }
.hist-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 40px 20px; line-height: 1.6; }

/* ── CHART TAB ── */
.chart-wrap { padding: 14px 16px 100px; }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.chart-title { color: var(--accent1); font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.chart-sub { color: var(--text-muted); font-size: 11px; margin-bottom: 14px; }
.chart-canvas-wrap { position: relative; height: 200px; }
.chart-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; }
.chart-stat { background: var(--bg-input); border-radius: 9px; padding: 10px 8px; text-align: center; }
.chart-stat-val { color: var(--accent1); font-size: 18px; font-weight: 700; }
.chart-stat-lbl { color: var(--text-muted); font-size: 10px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-ex-picker { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.chart-ex-picker::-webkit-scrollbar { display: none; }
.chart-ex-pill { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1.5px solid var(--border); background: transparent; color: var(--text-soft); font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.chart-ex-pill.active { background: var(--accent1); border-color: var(--accent1); color: var(--bg-deep); font-weight: 700; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg-deep); border-top: 1px solid var(--border); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 200; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: transparent; color: var(--text-muted); font-size: 10px; cursor: pointer; padding: 4px 0; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent1); }
</style>
</head>
<body>
<div class="app" id="app">

<div class="header">
  <div class="header-row">
    <div>
      <h1 id="app-title">💪 Workout Tracker</h1>
      <div class="sub" id="header-date"></div>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙ Customize</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-section">
    <div class="settings-label">Your Name</div>
    <input class="settings-input" id="set-name" type="text" placeholder="e.g. Damian" oninput="applySettings()">
  </div>
  <div class="settings-section">
    <div class="settings-label">App Title</div>
    <input class="settings-input" id="set-title" type="text" placeholder="e.g. 💪 Damian's Tracker" oninput="applySettings()">
  </div>
  <div class="settings-section">
    <div class="settings-label">Default Sets per Exercise</div>
    <div class="default-sets-row">
      <label>Sets</label>
      <input type="number" id="set-sets" min="1" max="6" value="3" oninput="applySettings()">
      <label>Reps</label>
      <input type="number" id="set-reps" min="1" max="30" value="10" oninput="applySettings()">
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Weight Unit</div>
    <div style="display:flex;gap:8px">
      <button id="unit-lbs" onclick="setUnit('lbs')" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--accent1);background:var(--accent1);color:var(--bg-deep);font-weight:700;cursor:pointer;font-size:13px">lbs</button>
      <button id="unit-kg"  onclick="setUnit('kg')"  style="flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text-soft);cursor:pointer;font-size:13px">kg</button>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-label">Theme</div>
    <div class="theme-grid">
      <div><div class="theme-swatch sw-ocean active" id="sw-ocean" onclick="setTheme('ocean')">🌊</div><span class="swatch-label">Ocean</span></div>
      <div><div class="theme-swatch sw-forest" id="sw-forest" onclick="setTheme('forest')">🌿</div><span class="swatch-label">Forest</span></div>
      <div><div class="theme-swatch sw-sunset" id="sw-sunset" onclick="setTheme('sunset')">🌅</div><span class="swatch-label">Sunset</span></div>
      <div><div class="theme-swatch sw-midnight" id="sw-midnight" onclick="setTheme('midnight')">🌙</div><span class="swatch-label">Midnight</span></div>
      <div><div class="theme-swatch sw-steel" id="sw-steel" onclick="setTheme('steel')">⚙️</div><span class="swatch-label">Steel</span></div>
    </div>
  </div>
  <button class="close-settings" onclick="toggleSettings()">Done</button>
</div>

<!-- PROGRESS + DAY NAV -->
<div id="prog-wrap" style="padding:10px 16px 0">
  <div class="prog-bar" id="prog-bar"></div>
  <div class="day-nav">
    <button class="day-arrow" onclick="changeDay(-1)">‹</button>
    <div class="day-center">
      <div class="day-name-txt" id="day-name"></div>
      <div class="day-date-txt" id="day-date"></div>
      <div id="day-badge-wrap"></div>
    </div>
    <button class="day-arrow" onclick="changeDay(1)">›</button>
  </div>
</div>

<!-- WORKOUT CONTENT -->
<div id="tab-workout"><div class="scroll-content" id="workout-content"></div></div>
<div id="tab-history" style="display:none"><div class="hist-wrap" id="history-content"></div></div>
<div id="tab-chart"   style="display:none"><div class="chart-wrap" id="chart-content"></div></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-workout" onclick="switchTab('workout')"><span class="nav-icon">🏋️</span><span>Workout</span></button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')"><span class="nav-icon">📊</span><span>History</span></button>
  <button class="nav-btn" id="nav-chart"   onclick="switchTab('chart')"><span class="nav-icon">📈</span><span>Progress</span></button>
</div>

</div><!-- .app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── PLAN ──
const plan = {
  Monday: {
    type:'gym-hard', badge:'🏋️ Hard Gym', badgeClass:'badge-gym',
    focus:'Hard Gym Day',
    exercises:[
      {name:'Dumbbell Incline Bench Press'},
      {name:'Neutral Grip Lat Pulldown'},
      {name:'Cable Single Arm Shoulder Press'},
      {name:'Standing Cable Rear Delt Fly'},
      {name:'Cable Single Arm Bicep Curl'},
      {name:'Smith Machine Close Grip Bench Press'},
    ]
  },
  Tuesday: {
    type:'run', badge:'🏃 Hard Run', badgeClass:'badge-run',
    focus:'Running Club — Hard 5K',
    checkpoints:['Warm-up','Run complete','Cool-down']
  },
  Wednesday: { type:'flex', badge:'📅 Flex', badgeClass:'badge-rest', focus:'Flex / Open Day' },
  Thursday: {
    type:'gym-hard', badge:'🏋️ Hard Gym', badgeClass:'badge-gym',
    focus:'Hard Gym Day + Treadmill',
    treadmill:true, treadmillLabel:'Incline Treadmill — 30 min',
    exercises:[
      {name:'Smith Machine Reverse Lunge'},
      {name:'Bent Knee Inverted Rows'},
      {name:'Leg Press Single Leg Calf Raise'},
      {name:'Dumbbell Single Arm Preacher Curl'},
      {name:'Single Arm Tricep Pushdown'},
    ]
  },
  Friday: { type:'flex', badge:'📅 Flex', badgeClass:'badge-rest', focus:'Flex / Open Day' },
  Saturday: {
    type:'gym-mod', badge:'🏋️ Moderate', badgeClass:'badge-mod',
    focus:'Left Arm Focus',
    treadmill:true, treadmillLabel:'Light Treadmill Run — 20 min',
    sauna:true,
    exercises:[
      {name:'Single-Arm DB Curl (left)'},
      {name:'Single-Arm Cable Row (left)'},
      {name:'Single-Arm Overhead Press (left)'},
      {name:'Single-Arm Tricep Extension (left)'},
    ]
  },
  Sunday: {
    type:'rest', badge:'😴 Rest', badgeClass:'badge-rest',
    focus:'Rest & Recovery',
    restItems:['Walking (light pace)','Sauna session','Stretching / Mobility','Hydrate & sleep well']
  }
};

// ── STATE ──
let state = {};
let cfg = { theme:'ocean', unit:'lbs', sets:3, reps:10, title:'💪 Workout Tracker', name:'' };
let currentDayIdx = new Date().getDay();
let activeTab = 'workout';
let histDayIdx = 0;
let chartDayIdx = 0;
let chartExIdx = 0;
let chartInstance = null;

function initState() {
  try { state = JSON.parse(localStorage.getItem('wt_custom_state')||'{}'); } catch(e){ state={}; }
  try { const c=JSON.parse(localStorage.getItem('wt_custom_cfg')||'{}'); Object.assign(cfg,c); } catch(e){}
}
function saveState() { try{ localStorage.setItem('wt_custom_state',JSON.stringify(state)); }catch(e){} }
function saveCfg()   { try{ localStorage.setItem('wt_custom_cfg',JSON.stringify(cfg));   }catch(e){} }

function weekKey(date) {
  const d = new Date(date||Date.now());
  const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
  return mon.getFullYear()+'-W'+String(mon.getMonth()+1).padStart(2,'0')+String(mon.getDate()).padStart(2,'0');
}
function weekLabel(wk) {
  const p=wk.split('-W'); const dt=new Date(p[0],parseInt(p[1].slice(0,2))-1,parseInt(p[1].slice(2,4)));
  return MONTHS[dt.getMonth()]+' '+dt.getDate();
}
const TWK = ()=>weekKey();

function getDateForDay(idx) {
  const t=new Date(); const d=new Date(t); d.setDate(t.getDate()+(idx-t.getDay())); return d;
}
function isDayDone(dn) {
  const d=plan[dn]; const wk=TWK();
  if(d.type==='rest'||d.type==='flex') return !!state['notes_'+wk+'_'+dn];
  if(d.type==='run') return d.checkpoints.every((_,i)=>state['cp_'+wk+'_'+dn+'_'+i]);
  if(d.exercises) return d.exercises.every((_,ei)=>
    Array.from({length:cfg.sets},(_,si)=>state[wk+'_'+dn+'_'+ei+'_'+si]).every(Boolean));
  return false;
}

// ── HELPERS ──
function sv(k,v){ state[k]=v; saveState(); }
function toggleSet(dn,ei,si){ const k=TWK()+'_'+dn+'_'+ei+'_'+si; state[k]=!state[k]; saveState(); render(); }
function toggleCp(dn,i){ const k='cp_'+TWK()+'_'+dn+'_'+i; state[k]=!state[k]; saveState(); render(); }
function toggleTmill(dn){ const k='tm_'+TWK()+'_'+dn; state[k]=!state[k]; saveState(); render(); }
function toggleSauna(dn){ const k='sau_'+TWK()+'_'+dn; state[k]=!state[k]; saveState(); render(); }
function changeDay(d){ currentDayIdx=(currentDayIdx+d+7)%7; render(); }

// ── SETTINGS ──
function toggleSettings(){
  const p=document.getElementById('settings-panel');
  const pw=document.getElementById('prog-wrap');
  const open=p.classList.toggle('open');
  if(open){
    document.getElementById('set-name').value=cfg.name||'';
    document.getElementById('set-title').value=cfg.title||'';
    document.getElementById('set-sets').value=cfg.sets;
    document.getElementById('set-reps').value=cfg.reps;
    pw.style.display='none';
  } else { pw.style.display=''; }
}
function applySettings(){
  cfg.name  = document.getElementById('set-name').value||'';
  cfg.title = document.getElementById('set-title').value||'💪 Workout Tracker';
  cfg.sets  = parseInt(document.getElementById('set-sets').value)||3;
  cfg.reps  = parseInt(document.getElementById('set-reps').value)||10;
  document.getElementById('app-title').textContent = cfg.title;
  saveCfg();
}
function setUnit(u){
  cfg.unit=u; saveCfg();
  document.getElementById('unit-lbs').style.background = u==='lbs'?'var(--accent1)':'transparent';
  document.getElementById('unit-lbs').style.color      = u==='lbs'?'var(--bg-deep)':'var(--text-soft)';
  document.getElementById('unit-lbs').style.borderColor= u==='lbs'?'var(--accent1)':'var(--border)';
  document.getElementById('unit-kg').style.background  = u==='kg'?'var(--accent1)':'transparent';
  document.getElementById('unit-kg').style.color       = u==='kg'?'var(--bg-deep)':'var(--text-soft)';
  document.getElementById('unit-kg').style.borderColor = u==='kg'?'var(--accent1)':'var(--border)';
}
function setTheme(t){
  cfg.theme=t; saveCfg();
  document.getElementById('app').className='app theme-'+t;
  ['ocean','forest','sunset','midnight','steel'].forEach(s=>{
    const el=document.getElementById('sw-'+s);
    if(el) el.classList.toggle('active',s===t);
  });
}

// ── STAT FIELD ──
function statFld(key,label,ph){
  const v=state[key]||'';
  return '<div class="stat-box"><div class="stat-box-label">'+label+'</div>'
    +'<input class="stat-box-input" type="text" inputmode="decimal" placeholder="'+ph+'" value="'+v+'"'
    +' onchange="sv(\''+key+'\',this.value)" oninput="sv(\''+key+'\',this.value)"></div>';
}

// ── RENDER WORKOUT ──
function render(){
  const dn=DAYS[currentDayIdx], d=plan[dn], wk=TWK();
  const dateObj=getDateForDay(currentDayIdx);
  const isToday=currentDayIdx===new Date().getDay();
  const dateStr=MONTHS[dateObj.getMonth()]+' '+dateObj.getDate()+', '+dateObj.getFullYear();

  document.getElementById('header-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('day-name').textContent=DAYS[currentDayIdx]+' — '+d.focus;
  document.getElementById('day-date').textContent=(isToday?'Today · ':'')+dateStr;
  document.getElementById('day-badge-wrap').innerHTML='<span class="day-badge '+d.badgeClass+'">'+d.badge+'</span>';

  document.getElementById('prog-bar').innerHTML=DAYS.map((n,i)=>{
    let cls='prog-seg';
    if(i===currentDayIdx) cls+=' active';
    else if(isDayDone(n)) cls+=plan[n].type==='run'?' run-done':plan[n].type==='rest'?' rest-done':' gym-done';
    return '<div class="'+cls+'" onclick="currentDayIdx='+i+';render()"></div>';
  }).join('');

  let html='';
  const notes=state['notes_'+wk+'_'+dn]||'';

  if(d.type==='rest'){
    html+='<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Rest & Recovery</div>';
    d.restItems.forEach(it=>{ html+='<div class="rest-item"><div class="rest-dot"></div><span>'+it+'</span></div>'; });
    html+='</div>';
  } else if(d.type==='flex'){
    html+='<div class="flex-card"><div class="flex-title">📅 Flex Day</div><div class="flex-desc">No structured workout.<br>Rest, light activity, or make-up session.</div></div>';
  } else if(d.type==='run'){
    html+='<div class="run-card"><div class="run-title">🏃 Running Club — Hard 5K</div><div class="stat-grid">';
    html+=statFld('rt-time-'+wk+'-'+dn,'Finish Time (mm:ss)','28:45');
    html+=statFld('rt-pace-'+wk+'-'+dn,'Avg Pace (min/km)','5:45');
    html+=statFld('rt-hr-'+wk+'-'+dn,'Heart Rate','162');
    html+=statFld('rt-feel-'+wk+'-'+dn,'Effort (1–10)','8');
    html+='</div><div class="cp-row">';
    d.checkpoints.forEach((cp,i)=>{
      const done=state['cp_'+wk+'_'+dn+'_'+i];
      html+='<button class="cp-btn'+(done?' done':'')+'" onclick="toggleCp(\''+dn+'\','+i+')">'+(done?'✓ ':'')+cp+'</button>';
    });
    html+='</div></div>';
  }

  if(d.treadmill){
    const done=state['tm_'+wk+'_'+dn];
    html+='<div class="tmill-card"><div class="tmill-title">🚶 '+d.treadmillLabel+'</div><div class="stat-grid">';
    html+=statFld('tm-inc-'+wk+'-'+dn,'Incline %','8');
    html+=statFld('tm-spd-'+wk+'-'+dn,'Speed (mph)','3.2');
    html+=statFld('tm-dst-'+wk+'-'+dn,'Distance (mi)','—');
    html+=statFld('tm-hr-'+wk+'-'+dn,'Heart Rate','135');
    html+='</div><button class="tmill-btn'+(done?' done':'')+'" onclick="toggleTmill(\''+dn+'\')">'+(done?'✓ Complete':'Mark Treadmill Complete')+'</button></div>';
  }

  if(d.sauna){
    const done=state['sau_'+wk+'_'+dn];
    html+='<div class="sauna-card"><div class="sauna-title">🔥 Sauna Session</div>'
      +'<button class="sauna-btn'+(done?' done':'')+'" onclick="toggleSauna(\''+dn+'\')">'+(done?'✓ Sauna Done':'Mark Sauna Complete')+'</button></div>';
  }

  if(d.exercises){
    html+='<div class="section-hdr">'+d.exercises.length+' exercises · tap sets to log</div>';
    d.exercises.forEach((ex,ei)=>{
      const sets=cfg.sets;
      const allDone=Array.from({length:sets},(_,si)=>state[wk+'_'+dn+'_'+ei+'_'+si]).every(Boolean);
      const w=state['w_'+wk+'_'+dn+'_'+ei]||'';
      const reps=state['reps_'+dn+'_'+ei]||cfg.reps;
      html+='<div class="card">';
      html+='<div class="card-ex-name"><span>'+(allDone?'✅':'○')+'</span><span>'+ex.name+'</span></div>';
      html+='<div class="sets-row">';
      for(let si=0;si<sets;si++){
        const done=state[wk+'_'+dn+'_'+ei+'_'+si];
        html+='<button class="set-btn'+(done?' done':'')+'" onclick="toggleSet(\''+dn+'\','+ei+','+si+')">'+(done?'✓ '+(si+1):'Set '+(si+1))+'</button>';
      }
      html+='</div>';
      html+='<div class="metric-row">'
        +'<div class="metric-group"><span class="metric-label">Weight</span>'
        +'<input class="metric-input" type="number" inputmode="decimal" placeholder="0" value="'+w+'"'
        +' onchange="sv(\'w_'+wk+'_'+dn+'_'+ei+'\',this.value)" oninput="sv(\'w_'+wk+'_'+dn+'_'+ei+'\',this.value)">'
        +'<span class="metric-unit">'+cfg.unit+'</span></div>'
        +'<div class="metric-group"><span class="metric-label">Reps</span>'
        +'<input class="metric-input reps" type="number" inputmode="numeric" min="1" max="99" value="'+reps+'"'
        +' onchange="sv(\'reps_'+dn+'_'+ei+'\',this.value)" oninput="sv(\'reps_'+dn+'_'+ei+'\',this.value)"></div>'
        +'</div></div>';
    });
  }

  html+='<div class="notes-card"><div class="notes-label">📝 Day Notes</div>'
    +'<textarea class="notes-area" rows="3" placeholder="Energy, joint pain, soreness, mood..."'
    +' onchange="sv(\'notes_'+wk+'_'+dn+'\',this.value)">'+notes+'</textarea></div>';

  document.getElementById('workout-content').innerHTML=html;
}

// ── RENDER HISTORY ──
function renderHistory(){
  const gymDays=['Monday','Thursday','Saturday'];
  let html='<div class="hist-day-pills">';
  gymDays.forEach((dn,i)=>{
    html+='<button class="hist-pill'+(histDayIdx===i?' active':'')+'" onclick="histDayIdx='+i+';renderHistory()">'+dn+'</button>';
  });
  html+='</div>';
  const dn=gymDays[histDayIdx];
  const exs=plan[dn].exercises||[];
  const allWks=new Set([TWK()]);
  Object.keys(state).forEach(k=>{ const m=k.match(/^w_(\d{4}-W\d{4})_/); if(m) allWks.add(m[1]); });
  const weeks=Array.from(allWks).sort().slice(-8);

  exs.forEach((ex,ei)=>{
    html+='<div class="hist-ex-card"><div class="hist-ex-name">'+ex.name+'</div><div>';
    let maxW=0, prWk='';
    weeks.forEach(wk=>{ const w=parseFloat(state['w_'+wk+'_'+dn+'_'+ei]||0); if(w>maxW){maxW=w;prWk=wk;} });
    let hasAny=false;
    weeks.forEach(wk=>{
      const w=state['w_'+wk+'_'+dn+'_'+ei];
      const isCur=wk===TWK();
      if(!w&&!isCur) return;
      hasAny=true;
      const pct=maxW>0?Math.max(6,Math.round((parseFloat(w||0)/maxW)*100)):6;
      const isPR=wk===prWk&&maxW>0;
      const barCol=isCur?'var(--accent1)':isPR?'var(--accent2)':'var(--text-muted)';
      html+='<div class="hist-row">'
        +'<div class="hist-week-lbl">'+(isCur?'This wk':weekLabel(wk))+'</div>'
        +'<div class="hist-bar-wrap"><div class="hist-bar" style="width:'+pct+'%;background:'+barCol+'">'
        +'<span class="hist-bar-val">'+(w?w+' '+cfg.unit:'—')+'</span>'
        +(isPR&&maxW>0?'<span class="hist-pr">PR</span>':'')+
        '</div></div></div>';
    });
    if(!hasAny) html+='<div style="color:var(--text-muted);font-size:12px;font-style:italic">No weight logged yet.</div>';
    html+='</div></div>';
  });
  document.getElementById('history-content').innerHTML=html;
}

// ── RENDER CHART (Progress tab) ──
function renderChart(){
  const gymDays=['Monday','Thursday','Saturday'];
  const dn=gymDays[chartDayIdx];
  const exs=plan[dn].exercises||[];
  const ex=exs[chartExIdx]||exs[0];
  if(!ex){ document.getElementById('chart-content').innerHTML='<div class="hist-empty">No exercises found.</div>'; return; }

  const allWks=new Set([TWK()]);
  Object.keys(state).forEach(k=>{ const m=k.match(/^w_(\d{4}-W\d{4})_/); if(m) allWks.add(m[1]); });
  const weeks=Array.from(allWks).sort().slice(-8);

  // Seed sample data if nothing logged yet (for demo)
  const sampleWeights = [45,50,50,55,57.5,60,62.5,65];
  const hasSomeData = weeks.some(wk=>state['w_'+wk+'_'+dn+'_'+chartExIdx]);
  if(!hasSomeData){
    weeks.forEach((wk,i)=>{ if(i<weeks.length) state['w_sample_'+wk+'_'+dn+'_'+chartExIdx]=sampleWeights[i]||65; });
  }

  const labels=[], data=[], bgColors=[];
  const accent1=getComputedStyle(document.documentElement).getPropertyValue('--accent1').trim()||'#00C2FF';
  const accent2=getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim()||'#00FF9C';

  weeks.forEach((wk,i)=>{
    const real=parseFloat(state['w_'+wk+'_'+dn+'_'+chartExIdx]||0);
    const sample=parseFloat(state['w_sample_'+wk+'_'+dn+'_'+chartExIdx]||0);
    const w=real||sample;
    labels.push(wk===TWK()?'This wk':weekLabel(wk));
    data.push(w||null);
    bgColors.push(wk===TWK()?accent1:accent2);
  });

  // Summary stats
  const vals=data.filter(v=>v!==null&&v>0);
  const maxVal=vals.length?Math.max(...vals):0;
  const lastVal=vals.length?vals[vals.length-1]:0;
  const firstVal=vals.length?vals[0]:0;
  const gain=lastVal-firstVal;

  // Day + exercise pickers
  let html='';
  html+='<div class="hist-day-pills">';
  gymDays.forEach((d2,i)=>{ html+='<button class="hist-pill'+(chartDayIdx===i?' active':'')+'" onclick="chartDayIdx='+i+';chartExIdx=0;renderChart()">'+d2+'</button>'; });
  html+='</div>';

  html+='<div class="chart-card">';
  html+='<div class="chart-title">Weight Progression</div>';
  html+='<div class="chart-sub" id="chart-ex-label">'+ex.name+'</div>';

  // Exercise pill picker
  html+='<div class="chart-ex-picker">';
  exs.forEach((e2,i)=>{
    html+='<button class="chart-ex-pill'+(chartExIdx===i?' active':'')+'" onclick="chartExIdx='+i+';renderChart()">'+e2.name.split(' ').slice(0,3).join(' ')+'</button>';
  });
  html+='</div>';

  html+='<div class="chart-canvas-wrap"><canvas id="progressChart"></canvas></div>';
  html+='<div class="chart-summary">';
  html+='<div class="chart-stat"><div class="chart-stat-val">'+(lastVal||'—')+'</div><div class="chart-stat-lbl">Current '+cfg.unit+'</div></div>';
  html+='<div class="chart-stat"><div class="chart-stat-val">'+(maxVal||'—')+'</div><div class="chart-stat-lbl">Best '+cfg.unit+'</div></div>';
  html+='<div class="chart-stat"><div class="chart-stat-val" style="color:'+(gain>=0?'var(--accent2)':'var(--accent3)')+'">'+(gain>0?'+':'')+( gain?gain.toFixed(1):'—')+'</div><div class="chart-stat-lbl">Total Gain</div></div>';
  html+='</div>';

  if(!hasSomeData) html+='<div style="color:var(--text-muted);font-size:11px;font-style:italic;margin-top:8px;text-align:center">Sample data shown — log weights to see real progress</div>';
  html+='</div>';

  document.getElementById('chart-content').innerHTML=html;

  // Build Chart.js chart
  if(chartInstance){ chartInstance.destroy(); chartInstance=null; }
  const ctx=document.getElementById('progressChart');
  if(!ctx) return;

  const bgDeep=getComputedStyle(document.documentElement).getPropertyValue('--bg-deep').trim()||'#0D1B2A';
  const textMuted=getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim()||'#4A6580';
  const textSoft=getComputedStyle(document.documentElement).getPropertyValue('--text-soft').trim()||'#8BA8C4';
  const border=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#2D4460';

  chartInstance = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        label: 'Weight ('+cfg.unit+')',
        data,
        borderColor: accent1,
        backgroundColor: accent1+'30',
        pointBackgroundColor: bgColors,
        pointBorderColor: bgColors,
        pointRadius: 6,
        pointHoverRadius: 8,
        tension: 0.4,
        fill: true,
        spanGaps: true,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg-card').trim(),
          titleColor: accent1,
          bodyColor: textSoft,
          borderColor: border,
          borderWidth:1,
          callbacks:{ label: ctx=>ctx.parsed.y+' '+cfg.unit }
        }
      },
      scales:{
        x:{ grid:{ color: border+'60' }, ticks:{ color:textMuted, font:{size:10} } },
        y:{ grid:{ color: border+'60' }, ticks:{ color:textMuted, font:{size:10}, callback:v=>v+' '+cfg.unit }, beginAtZero:false }
      }
    }
  });
}

// ── SWITCH TABS ──
function switchTab(tab){
  activeTab=tab;
  ['workout','history','chart'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
    document.getElementById('nav-'+t).className='nav-btn'+(t===tab?' active':'');
  });
  const pw=document.getElementById('prog-wrap');
  const sp=document.getElementById('settings-panel');
  if(tab==='workout'){
    pw.style.display=''; sp.classList.remove('open');
    render();
  } else { pw.style.display='none'; }
  if(tab==='history') renderHistory();
  if(tab==='chart') renderChart();
}

// ── INIT ──
initState();
document.getElementById('app').className='app theme-'+cfg.theme;
document.getElementById('app-title').textContent=cfg.title;
document.getElementById('header-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
setUnit(cfg.unit);
['ocean','forest','sunset','midnight','steel'].forEach(s=>{
  const el=document.getElementById('sw-'+s);
  if(el) el.classList.toggle('active',s===cfg.theme);
});
render();
</script>
